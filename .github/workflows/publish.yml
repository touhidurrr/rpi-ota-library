name: Build and Publish OTA Releases

on:
  push:
    branches:
      - main
    paths:
      - ota/**
      - .github/workflows/**
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download & Install otamaker
        run: |
          curl -L https://raw.githubusercontent.com/raspberrypi/utils/refs/heads/master/otamaker/otamaker -o otamaker
          chmod +x otamaker
          sudo mv otamaker /usr/local/bin/

      - name: Build OTA packages
        run: |
          set -euo pipefail
          built=0
          for index in ota/*/index.yml; do
            [ -f "$index" ] || continue
            echo "Building OTA from $index"
            dir=$(dirname "$index")
            cd "$dir"
            otamaker -w index.yml
            cd -
            built=$((built + 1))
          done
          if [ "$built" -eq 0 ]; then
            echo "No OTA index files found in ota/*/index.yml"
            exit 1
          fi

          # Move built artifacts to root directory
          mv ota/*/*.tar.zst . 2>/dev/null || true
          mv ota/*/*.tar.zst.sha256sum . 2>/dev/null || true

      - name: Ensure checksum files exist
        run: |
          set -euo pipefail
          for ota in ./*.tar.zst; do
            [ -f "$ota" ] || continue
            if [ ! -f "$ota.sha256sum" ]; then
              sha256sum "$ota" > "$ota.sha256sum"
            fi
          done

      - name: Create release metadata
        id: release
        run: |
          set -euo pipefail

          # Grab the short commit SHA (first 7 characters)
          short_sha="${GITHUB_SHA::7}"
          release_name="Release - ${short_sha}"

          # Write notes to a markdown file
          {
            echo "Automated OTA release generated from \`${GITHUB_REF}\`."
            echo ""
            echo "### 📦 Artifacts"
          } > release_notes.md

          for ota in ./*.tar.zst; do
            [ -f "$ota" ] || continue
            
            filename=$(basename "$ota")
            sha=$(sha256sum "$ota" | cut -d' ' -f1)
            
            echo "- **${filename}**" >> release_notes.md
            echo "  - SHA-256: \`${sha}\`" >> release_notes.md
          done

          if ! ls ./*.tar.zst >/dev/null 2>&1; then
            echo "No OTA artifacts built."
            exit 1
          fi

          # Export to GitHub Outputs
          echo "release_name=$release_name" >> "$GITHUB_OUTPUT"
          echo "release_notes<<EOF" >> "$GITHUB_OUTPUT"
          cat release_notes.md >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ steps.release.outputs.release_name }}
          body: ${{ steps.release.outputs.release_notes }}
          files: |
            ./*.tar.zst
            ./*.tar.zst.sha256sum
          draft: false
          prerelease: false
